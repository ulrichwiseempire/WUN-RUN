<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WISE RUN - Mobile Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #fff; letter-spacing: 3px; pointer-events: none; z-index: 5;
        }
        .brand { font-weight: bold; color: #00ffff; font-size: 24px; text-shadow: 0 0 10px #00ffff; }
        .score { font-size: 12px; opacity: 0.8; margin-top: 5px; }

        /* Zones de contrôle tactiles */
        .touch-zone {
            position: absolute; top: 0; width: 50%; height: 100%; z-index: 2;
        }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        #game-over {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            color: white; background: rgba(0, 0, 0, 0.9);
            padding: 30px; border: 1px solid #00ffff; z-index: 10; width: 80%;
        }
        h1 { font-size: 30px; color: #ff0066; margin: 0; }
        button {
            background: transparent; border: 1px solid #00ffff; color: #00ffff;
            padding: 15px 30px; cursor: pointer; margin-top: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="brand">WISE RUN</div>
        <div id="score-display" class="score">DISTANCE: 0m</div>
    </div>

    <div id="left-zone" class="touch-zone"></div>
    <div id="right-zone" class="touch-zone"></div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <div id="final-score" style="margin: 15px 0;">DISTANCE : 0m</div>
        <button onclick="location.reload()">REPRENDRE LA MISSION</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ffff, 2);
        pointLight.position.set(0, 5, 5);
        scene.add(pointLight);

        const carGeometry = new THREE.BoxGeometry(1.2, 0.6, 2.5);
        const carMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const car = new THREE.Mesh(carGeometry, carMaterial);
        car.position.y = 0.5;
        scene.add(car);

        const gridHelper = new THREE.GridHelper(500, 100, 0x00ffff, 0x111111);
        scene.add(gridHelper);

        camera.position.set(0, 4, 8);
        camera.lookAt(0, 1, 0);

        let targetX = 0;
        const lanes = [-4, 0, 4];
        let currentLane = 1;
        let score = 0;
        let gameActive = true;
        let gameSpeed = 1.8;
        const obstacles = [];

        const obsGeo = new THREE.BoxGeometry(2.5, 5, 1);
        const obsMat = new THREE.MeshPhongMaterial({ color: 0xff0066, transparent: true, opacity: 0.8 });

        function spawnObstacle() {
            if (!gameActive) return;
            const obs = new THREE.Mesh(obsGeo, obsMat);
            const laneIndex = Math.floor(Math.random() * 3);
            obs.position.set(lanes[laneIndex], 2.5, -120);
            scene.add(obs);
            obstacles.push(obs);
        }
        setInterval(spawnObstacle, 1000);

        // --- CONTRÔLES TACTILES ---
        document.getElementById('left-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (currentLane > 0) currentLane--;
            targetX = lanes[currentLane];
        });

        document.getElementById('right-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (currentLane < 2) currentLane++;
            targetX = lanes[currentLane];
        });

        // --- CLAVIER (pour PC aussi) ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentLane > 0) currentLane--;
            if (e.key === 'ArrowRight' && currentLane < 2) currentLane++;
            targetX = lanes[currentLane];
        });

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            gridHelper.position.z += gameSpeed;
            if (gridHelper.position.z > 10) gridHelper.position.z = 0;

            car.position.x += (targetX - car.position.x) * 0.15;
            car.rotation.z = -(car.position.x - targetX) * 0.25;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += gameSpeed;
                if (Math.abs(obstacles[i].position.z - car.position.z) < 1.5 && 
                    Math.abs(obstacles[i].position.x - car.position.x) < 1.5) {
                    endGame();
                }
                if (obstacles[i].position.z > 15) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                }
            }

            score += 1;
            document.getElementById('score-display').innerText = `DISTANCE: ${Math.floor(score/10)}m`;
            renderer.render(scene, camera);
        }

        function endGame() {
            gameActive = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = `DISTANCE : ${Math.floor(score/10)}m`;
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
