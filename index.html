<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WISE DELIVERY - RUN</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Arial', sans-serif; touch-action: manipulation; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff; z-index: 5; pointer-events: none;
        }
        .brand { font-weight: bold; color: #ffcc00; font-size: 24px; text-shadow: 2px 2px #000; }
        .score { font-size: 18px; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        
        .touch-zone { position: absolute; top: 0; width: 50%; height: 100%; z-index: 2; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        #game-over {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            color: white; background: rgba(0, 0, 0, 0.9);
            padding: 30px; border: 3px solid #ffcc00; z-index: 10; width: 80%; border-radius: 15px;
        }
        button {
            background: #ffcc00; border: none; color: #000;
            padding: 15px 30px; cursor: pointer; margin-top: 20px; font-weight: bold; border-radius: 10px; font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="brand">WISE DELIVERY 📦</div>
        <div id="score-display" class="score">COLIS LIVRÉS: 0</div>
    </div>

    <div id="left-zone" class="touch-zone"></div>
    <div id="right-zone" class="touch-zone"></div>

    <div id="game-over">
        <h1>LIVRAISON ÉCHOUÉE ! 💥</h1>
        <div id="final-score" style="margin: 15px 0; font-size: 20px;">SCORE : 0</div>
        <button onclick="location.reload()">RECOMMENCER</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Ciel bleu ville
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lumières
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(light);

        // --- LA ROUTE ---
        const roadGeo = new THREE.PlaneGeometry(15, 1000);
        const roadMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Lignes de la route
        const lineGeo = new THREE.PlaneGeometry(0.2, 1000);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const line1 = new THREE.Mesh(lineGeo, lineMat);
        line1.rotation.x = -Math.PI / 2;
        line1.position.set(-2.5, 0.01, 0);
        scene.add(line1);
        const line2 = line1.clone();
        line2.position.set(2.5, 0.01, 0);
        scene.add(line2);

        // --- LE LIVREUR (Un perso stylisé) ---
        const bodyGeo = new THREE.BoxGeometry(1, 1.5, 0.8);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x0077ff }); // T-shirt bleu
        const player = new THREE.Group();
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        player.add(body);

        // Le Colis sur le dos
        const packGeo = new THREE.BoxGeometry(0.8, 0.8, 0.5);
        const packMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 }); // Carton brun
        const pack = new THREE.Mesh(packGeo, packMat);
        pack.position.set(0, 0.2, -0.6);
        player.add(pack);

        player.position.y = 0.75;
        scene.add(player);

        camera.position.set(0, 4, 7);
        camera.lookAt(0, 1, -2);

        // État
        let targetX = 0;
        const lanes = [-4, 0, 4];
        let currentLane = 1;
        let score = 0;
        let gameActive = true;
        let speed = 0.6;
        const obstacles = [];

        // --- OBSTACLES (Camions / Barrières) ---
        function spawnObstacle() {
            if (!gameActive) return;
            const isTruck = Math.random() > 0.5;
            const geo = isTruck ? new THREE.BoxGeometry(3, 3, 5) : new THREE.BoxGeometry(3, 1, 1);
            const mat = new THREE.MeshPhongMaterial({ color: isTruck ? 0xff4400 : 0xffff00 });
            const obs = new THREE.Mesh(geo, mat);
            obs.position.set(lanes[Math.floor(Math.random() * 3)], isTruck ? 1.5 : 0.5, -100);
            scene.add(obs);
            obstacles.push(obs);
        }
        setInterval(spawnObstacle, 1200);

        // Contrôles
        const move = (dir) => {
            if (dir === 'left' && currentLane > 0) currentLane--;
            if (dir === 'right' && currentLane < 2) currentLane++;
            targetX = lanes[currentLane];
        };

        document.getElementById('left-zone').addEventListener('touchstart', (e) => { e.preventDefault(); move('left'); });
        document.getElementById('right-zone').addEventListener('touchstart', (e) => { e.preventDefault(); move('right'); });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // Animation course (balancement)
            player.position.y = 0.75 + Math.sin(Date.now() * 0.01) * 0.1;
            player.position.x += (targetX - player.position.x) * 0.15;
            player.rotation.y = (targetX - player.position.x) * 0.1;

            // Sol qui défile
            road.position.z += speed * 10;
            if (road.position.z > 100) road.position.z = 0;
            line1.position.z = road.position.z;
            line2.position.z = road.position.z;

            // Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += speed * 2;
                
                // Collision simple
                if (Math.abs(obstacles[i].position.z - player.position.z) < 2 && 
                    Math.abs(obstacles[i].position.x - player.position.x) < 1.5) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'block';
                    document.getElementById('final-score').innerText = `COLIS LIVRÉS : ${Math.floor(score/10)}`;
                }

                if (obstacles[i].position.z > 20) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                }
            }

            score += 1;
            speed += 0.0001; // Accélération progressive
            document.getElementById('score-display').innerText = `DISTANCE: ${Math.floor(score/10)}m`;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
